name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
        if: github.event_name == 'push'

      - run: npm i
        if: github.event_name == 'pull_request'

      - run: npm test
