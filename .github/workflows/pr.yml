name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
        if: github.event_name == 'push'

      - run: npm i
        if: github.event_name == 'pull_request'

      - run: npm test
